<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>Lyn's Shopping List</title>
</head>
<body> 
    <header>
        <nav>
            <div class="logo">
                <i class="fa-solid fa-cart-shopping"></i>
            </div>
            <div class ="title">
                <h2> Shopping List</h2>
            </div>  
        </nav>
        
    </header>

    <hr>
    
    <!-- Input section -->
     
        <input type="text" placeholder="Item name" id="input-item">
        
        <input type="number" placeholder="Price" id="input-price">
        <br>
        <button id="add-btn">Add</button>
    

    <!-- List section -->
     <div id="list-container"></div>

     <p>Total: <span id="total-cost"></span> </p>

    <div>
        <button id="clear-btn">Clear List</button>
    </div>
     
    
    <script src="main.js"></script>
</body>
</html>
